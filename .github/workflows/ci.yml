name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- Backend ----
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Audit production dependencies (high+ only)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  # ---- Frontend ----
  frontend:
    name: Frontend — lint, build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npx vitest run

      - name: Build (vite)
        # Catches issues invisible to tsc: missing imports inside dynamic chunks,
        # CSS errors, env var typos, etc.
        run: npm run build

      - name: Audit production dependencies (high+ only)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
