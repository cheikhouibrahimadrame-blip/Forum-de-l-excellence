databases:
  - name: forum-excellence-db
    databaseName: forum_excellence
    user: forum_user

services:
  - type: redis
    name: forum-excellence-redis
    ipAllowList: []

  - type: web
    name: forum-excellence-api
    env: node
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: forum-excellence-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: forum-excellence-redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 60m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: RATE_LIMIT_DISABLE_IN_DEV
        value: "false"
      # Render sits one hop in front of the app — express needs to know
      # so req.ip / X-Forwarded-For resolve to the real client.
      - key: TRUST_PROXY
        value: "1"

  - type: web
    name: forum-excellence-frontend
    runtime: static
    rootDir: app
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    # SPA rewrite — without this, refreshing /admin/users (or any deep link)
    # returns a 404 from Render's static host because no `index.html` is
    # served for arbitrary paths.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
